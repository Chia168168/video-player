<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>影片播放器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --accent: #c8ff47;
    --accent2: #47d4ff;
    --text: #f0f0f4;
    --muted: #888899;
  }

  html, body {
    background: #000;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100%;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* ══ UPLOAD SCREEN ══ */
  #upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    gap: 24px;
    padding: 32px;
    background: #0a0a0c;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .upload-zone {
    width: 100%; max-width: 340px;
    aspect-ratio: 16/10;
    border: 1.5px dashed rgba(200,255,71,0.3);
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: linear-gradient(135deg, rgba(200,255,71,0.03), rgba(71,212,255,0.03));
    position: relative; overflow: hidden; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:active { border-color: var(--accent); background: rgba(200,255,71,0.07); }
  .upload-zone::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(200,255,71,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .upload-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: rgba(200,255,71,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg { width: 28px; height: 28px; stroke: var(--accent); }
  .upload-text { font-size: 15px; font-weight: 600; }
  .upload-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  #file-input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; z-index: 10; font-size: 16px;
  }

  /* ══ PLAYER SCREEN — true fullscreen ══ */
  #player-screen {
    display: none;
    position: fixed; inset: 0;
    background: #000;
  }

  #video-container {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #video {
    width: 100%; height: 100%;
    display: block; object-fit: contain;
  }

  /* Tap zone over video */
  #tap-overlay {
    position: absolute; inset: 0;
    z-index: 5; cursor: pointer;
  }

  /* ── Time info top-right ── */
  #time-overlay {
    position: absolute;
    top: max(env(safe-area-inset-top, 0px), 8px);
    right: 12px;
    margin-top: 8px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 8px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--accent);
    letter-spacing: 0.05em;
    pointer-events: none;
    line-height: 1.7; text-align: right;
    z-index: 20;
    transition: opacity 0.3s;
  }
  #time-overlay.hidden { opacity: 0; }

  /* ── Show-controls chevron pill ── */
  #show-pill {
    position: absolute;
    bottom: max(env(safe-area-inset-bottom, 0px), 10px);
    margin-bottom: 6px;
    left: 50%; transform: translateX(-50%);
    z-index: 40;
    background: rgba(255,255,255,0.13);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 5px 24px;
    color: rgba(255,255,255,0.55);
    font-size: 18px; line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
  }

  /* ══ FLOATING CONTROLS PANEL ══ */
  #controls {
    position: absolute; left: 0; right: 0; bottom: 0;
    z-index: 30;
    background: linear-gradient(to top,
      rgba(0,0,0,0.96) 0%,
      rgba(0,0,0,0.88) 55%,
      transparent 100%
    );
    padding-top: 32px;
    padding-bottom: max(env(safe-area-inset-bottom, 0px), 6px);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  }
  #controls.hidden {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }

  /* Hide chevron pill at top of panel */
  #hide-pill {
    display: flex; justify-content: center;
    margin-bottom: 2px;
  }
  #hide-pill button {
    background: rgba(255,255,255,0.09);
    border: none; border-radius: 100px;
    padding: 3px 22px; cursor: pointer;
    color: rgba(255,255,255,0.38); font-size: 16px; line-height: 1.3;
  }

  /* Speed row */
  #speed-row {
    display: flex; align-items: center;
    padding: 6px 12px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .speed-label {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--muted); letter-spacing: 0.2em;
    text-transform: uppercase; margin-right: 10px; white-space: nowrap;
  }
  .speed-btns {
    display: flex; gap: 6px; flex: 1;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .speed-btns::-webkit-scrollbar { display: none; }
  .speed-btn {
    flex-shrink: 0; padding: 5px 11px;
    border-radius: 100px; border: 1.5px solid rgba(255,255,255,0.12);
    background: transparent; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .speed-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #0a0a0c; font-weight: 500;
  }
  .speed-btn:active { opacity: 0.7; transform: scale(0.95); }

  /* Playback row */
  #playback-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .ctrl-btn {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px; padding: 10px 12px;
    cursor: pointer; transition: all 0.15s;
    flex: 1; max-width: 72px; min-height: 54px;
  }
  .ctrl-btn svg { width: 20px; height: 20px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .ctrl-btn span { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: 0.05em; }
  .ctrl-btn:active { background: rgba(200,255,71,0.12); border-color: var(--accent); transform: scale(0.95); }

  #play-btn {
    background: var(--accent); border-color: var(--accent);
    max-width: 80px; min-height: 60px;
  }
  #play-btn svg { stroke: #0a0a0c; width: 24px; height: 24px; }
  #play-btn span { color: rgba(10,10,12,0.55); }
  #play-btn:active { opacity: 0.75; transform: scale(0.95); }

  .save-btn { background: rgba(71,212,255,0.08); border-color: rgba(71,212,255,0.2); }
  .save-btn svg { stroke: var(--accent2); }

  /* Timeline */
  #timeline-section {
    padding: 8px 12px 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .timeline-label {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;
    display: flex; justify-content: space-between;
  }
  #progress-bar-wrap {
    position: relative; height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px; cursor: pointer;
  }
  #progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; width: 0%;
    transition: width 0.08s linear;
  }
  #thumbnail-strip {
    position: relative; height: 50px;
    border-radius: 8px; overflow: hidden;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
  }
  #thumb-canvas-strip {
    display: flex; height: 100%; width: 100%;
    position: absolute; top: 0; left: 0;
  }
  #thumb-canvas-strip canvas { flex-shrink: 0; height: 100%; object-fit: cover; }
  #timeline-indicator {
    position: absolute; top: 0; width: 2px; height: 100%;
    background: var(--accent); pointer-events: none;
    box-shadow: 0 0 6px var(--accent); z-index: 10;
  }
  #timeline-indicator::before {
    content: ''; position: absolute; top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
  }
  .thumb-loading {
    color: var(--muted); font-size: 11px;
    font-family: 'DM Mono', monospace; text-align: center; padding: 8px 0 0;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 50px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: rgba(15,15,22,0.92);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text); padding: 9px 18px;
    border-radius: 100px; font-size: 13px;
    font-family: 'DM Mono', monospace;
    opacity: 0; pointer-events: none;
    transition: all 0.25s; z-index: 9999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Upload -->
<div id="upload-screen">
  <div class="logo">Video Frame Player</div>
  <div class="upload-zone">
    <input type="file" id="file-input" accept="video/*">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
      </svg>
    </div>
    <div class="upload-text">選擇影片</div>
    <div class="upload-sub">MP4 · MOV · WebM</div>
  </div>
</div>

<!-- Player -->
<div id="player-screen">
  <div id="video-container">
    <video id="video" playsinline webkit-playsinline></video>
  </div>

  <div id="tap-overlay"></div>

  <div id="time-overlay">
    <div id="time-display">00:00.000</div>
    <div id="frame-display">Frame —</div>
  </div>

  <!-- Show controls pill (when panel hidden) -->
  <div id="show-pill">︿</div>

  <!-- Floating controls -->
  <div id="controls">
    <div id="hide-pill"><button>︾</button></div>

    <div id="speed-row">
      <div class="speed-label">速度</div>
      <div class="speed-btns">
        <button class="speed-btn" data-speed="0.1">× 0.1</button>
        <button class="speed-btn" data-speed="0.5">× 0.5</button>
        <button class="speed-btn active" data-speed="1">× 1</button>
        <button class="speed-btn" data-speed="2">× 2</button>
        <button class="speed-btn" data-speed="frame">1 Frame/s</button>
      </div>
      <button id="change-video-btn" style="
        flex-shrink:0;margin-left:8px;padding:5px 11px;
        border-radius:100px;border:1.5px solid rgba(71,212,255,0.3);
        background:rgba(71,212,255,0.08);color:#47d4ff;
        font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;white-space:nowrap;
      ">換片</button>
    </div>

    <div id="playback-row">
      <button class="ctrl-btn" id="back5-btn">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.47"/><text x="12" y="14.5" text-anchor="middle" font-size="6" fill="white" stroke="none" font-family="monospace">5</text></svg>
        <span>-5s</span>
      </button>
      <button class="ctrl-btn" id="prev-frame-btn">
        <svg viewBox="0 0 24 24"><polygon points="11 19 2 12 11 5 11 19"/><line x1="22" y1="19" x2="22" y2="5"/></svg>
        <span>上格</span>
      </button>
      <button class="ctrl-btn" id="play-btn">
        <svg id="play-icon" viewBox="0 0 24 24"><polygon fill="#0a0a0c" stroke="#0a0a0c" points="5 3 19 12 5 21 5 3"/></svg>
        <span id="play-label">播放</span>
      </button>
      <button class="ctrl-btn" id="next-frame-btn">
        <svg viewBox="0 0 24 24"><polygon points="13 19 22 12 13 5 13 19"/><line x1="2" y1="19" x2="2" y2="5"/></svg>
        <span>下格</span>
      </button>
      <button class="ctrl-btn" id="fwd5-btn">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.47"/><text x="12" y="14.5" text-anchor="middle" font-size="6" fill="white" stroke="none" font-family="monospace">5</text></svg>
        <span>+5s</span>
      </button>
      <button class="ctrl-btn save-btn" id="save-btn">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="13" r="3"/><rect x="8" y="3" width="8" height="4" rx="1"/></svg>
        <span>截圖</span>
      </button>
    </div>

    <div id="timeline-section">
      <div class="timeline-label">
        <span>時間軸</span>
        <span id="total-time-label">—</span>
      </div>
      <div id="progress-bar-wrap"><div id="progress-fill"></div></div>
      <div id="thumbnail-strip">
        <div id="thumb-canvas-strip"></div>
        <div id="timeline-indicator"></div>
      </div>
      <div id="thumb-status" class="thumb-loading">生成縮圖中…</div>
    </div>
  </div>
</div>

<div id="toast"></div>
<canvas id="hidden-canvas" style="display:none"></canvas>

<script>
const video             = document.getElementById('video');
const fileInput         = document.getElementById('file-input');
const uploadScreen      = document.getElementById('upload-screen');
const playerScreen      = document.getElementById('player-screen');
const playBtn           = document.getElementById('play-btn');
const playIcon          = document.getElementById('play-icon');
const playLabel         = document.getElementById('play-label');
const timeDisplay       = document.getElementById('time-display');
const frameDisplay      = document.getElementById('frame-display');
const progressFill      = document.getElementById('progress-fill');
const timelineIndicator = document.getElementById('timeline-indicator');
const thumbnailStrip    = document.getElementById('thumbnail-strip');
const thumbCanvasStrip  = document.getElementById('thumb-canvas-strip');
const hiddenCanvas      = document.getElementById('hidden-canvas');
const thumbStatus       = document.getElementById('thumb-status');
const totalTimeLabel    = document.getElementById('total-time-label');
const controls          = document.getElementById('controls');
const showPill          = document.getElementById('show-pill');
const timeOverlay       = document.getElementById('time-overlay');

let fps = 30;       // will be updated after detection
let fpsDetected = false;
let duration = 0;
let isPlaying = false;
let currentSpeed = 1;
let frameMode = false;
let frameInterval = null;
let currentBlobUrl = null;
let panelVisible = true;
let autoHideTimer = null;

// ── Utils ──
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(3);
  return `${String(m).padStart(2,'0')}:${sec.padStart(6,'0')}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function updateUI() {
  const ct = video.currentTime;
  const frame = Math.round(ct * fps);
  timeDisplay.textContent = formatTime(ct);
  frameDisplay.textContent = `Frame ${frame}  @${fps}fps`;
  const pct = duration ? (ct / duration) * 100 : 0;
  progressFill.style.width = pct + '%';
  timelineIndicator.style.left = pct + '%';
}

// ── Panel show / hide ──
function showPanel() {
  panelVisible = true;
  controls.classList.remove('hidden');
  showPill.style.display = 'none';
  timeOverlay.classList.remove('hidden');
  resetAutoHide();
}
function hidePanel() {
  panelVisible = false;
  controls.classList.add('hidden');
  showPill.style.display = 'flex';
  clearTimeout(autoHideTimer);
}
function resetAutoHide() {
  clearTimeout(autoHideTimer);
  if (isPlaying && !frameMode) {
    autoHideTimer = setTimeout(hidePanel, 4000);
  }
}

document.getElementById('hide-pill').querySelector('button').addEventListener('click', hidePanel);
showPill.addEventListener('click', showPanel);

// Tap video: show panel if hidden; else toggle play
document.getElementById('tap-overlay').addEventListener('click', () => {
  if (!panelVisible) { showPanel(); return; }
  togglePlay();
});

// ── File load ──
const changeInput = document.createElement('input');
changeInput.type = 'file';
changeInput.accept = 'video/*';
changeInput.style.display = 'none';
document.body.appendChild(changeInput);

fileInput.addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  fileInput.value = '';
  loadVideoFile(f);
});
changeInput.addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  changeInput.value = '';
  loadVideoFile(f);
});
document.getElementById('change-video-btn').addEventListener('click', e => {
  e.stopPropagation(); changeInput.click();
});

function loadVideoFile(file) {
  stopFrameMode();
  video.pause();
  isPlaying = false; setPlayIcon(false);
  duration = 0;
  thumbCanvasStrip.innerHTML = '';
  thumbStatus.textContent = '生成縮圖中…';
  thumbStatus.style.display = 'block';

  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.speed-btn[data-speed="1"]').classList.add('active');
  currentSpeed = 1; video.playbackRate = 1;
  fps = 30; fpsDetected = false;

  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
  currentBlobUrl = URL.createObjectURL(file);
  video.src = currentBlobUrl;
  video.load();

  uploadScreen.style.display = 'none';
  playerScreen.style.display = 'block';
  showPanel();

  video.addEventListener('loadedmetadata', onMetaLoaded, { once: true });
  video.addEventListener('canplay', function probe() {
    video.removeEventListener('canplay', probe);
    if (duration === 0 && video.duration > 0) onMetaLoaded();
  });
}

function onMetaLoaded() {
  duration = video.duration;
  fpsDetected = false;
  fps = 30; // reset default
  totalTimeLabel.textContent = formatTime(duration);
  updateUI();
  detectFPS().then(() => {
    updateUI(); // refresh frame display after fps known
    generateThumbnails();
  });
}

// ── FPS Detection ──
// Strategy 1: requestVideoFrameCallback (Chrome/Safari 15.4+) — most accurate
// Strategy 2: sample timestamps during short playback
// Strategy 3: fallback common rates by rounding
function detectFPS() {
  return new Promise(resolve => {

    // Method 1: requestVideoFrameCallback
    if (typeof video.requestVideoFrameCallback === 'function') {
      let lastTime = null;
      let samples = [];
      let frameCount = 0;
      const MAX_SAMPLES = 10;

      function rvfcCallback(now, meta) {
        if (lastTime !== null) {
          const diff = meta.mediaTime - lastTime;
          if (diff > 0 && diff < 0.2) samples.push(diff);
        }
        lastTime = meta.mediaTime;
        frameCount++;

        if (samples.length >= MAX_SAMPLES) {
          // median of intervals
          samples.sort((a, b) => a - b);
          const median = samples[Math.floor(samples.length / 2)];
          fps = snapToCommonFPS(1 / median);
          fpsDetected = true;
          video.pause();
          video.currentTime = 0;
          showToast(`偵測到 ${fps} fps`);
          resolve();
        } else {
          video.requestVideoFrameCallback(rvfcCallback);
        }
      }

      // Seek to start and play briefly
      video.currentTime = 0;
      video.playbackRate = 1;
      const wasPaused = video.paused;
      video.play().then(() => {
        video.requestVideoFrameCallback(rvfcCallback);
      }).catch(() => {
        // If autoplay blocked, fall back
        fallbackFPS(resolve);
      });

      // Timeout guard
      setTimeout(() => {
        if (!fpsDetected) {
          video.pause();
          video.currentTime = 0;
          fallbackFPS(resolve);
        }
      }, 2500);
      return;
    }

    // Method 2: no rvfc support
    fallbackFPS(resolve);
  });
}

function fallbackFPS(resolve) {
  // Use getVideoPlaybackQuality if available to count frames over time
  if (video.getVideoPlaybackQuality) {
    video.currentTime = 0;
    video.playbackRate = 1;
    video.play().catch(() => {});
    const startQ = video.getVideoPlaybackQuality();
    const startFrames = startQ.totalVideoFrames;
    const startTime = performance.now();

    setTimeout(() => {
      const q = video.getVideoPlaybackQuality();
      const elapsed = (performance.now() - startTime) / 1000;
      const frames = q.totalVideoFrames - startFrames;
      if (elapsed > 0 && frames > 2) {
        fps = snapToCommonFPS(frames / elapsed);
      }
      fpsDetected = true;
      video.pause();
      video.currentTime = 0;
      showToast(`偵測到 ${fps} fps`);
      resolve();
    }, 1500);
    return;
  }

  // Last resort: keep default 30fps but try to guess from duration
  fps = 30;
  fpsDetected = false;
  resolve();
}

// Snap detected fps to nearest common value
function snapToCommonFPS(raw) {
  const common = [23.976, 24, 25, 29.97, 30, 48, 50, 59.94, 60, 90, 120, 240];
  let best = common[0], bestDiff = Math.abs(raw - common[0]);
  for (const c of common) {
    const d = Math.abs(raw - c);
    if (d < bestDiff) { bestDiff = d; best = c; }
  }
  // Only snap if close enough (within 10%), else use rounded raw
  return bestDiff / raw < 0.1 ? best : Math.round(raw);
}

// ── Thumbnails ──
async function generateThumbnails() {
  thumbCanvasStrip.innerHTML = '';
  thumbStatus.style.display = 'block';
  await new Promise(r => setTimeout(r, 100));
  const W = thumbnailStrip.offsetWidth || 320;
  const H = thumbnailStrip.offsetHeight || 50;
  const count = Math.max(10, Math.round(W / (H * 16 / 9)));
  const tw = Math.round(W / count);

  for (let i = 0; i < count; i++) {
    await seekToTime((i / count) * duration);
    const c = document.createElement('canvas');
    c.width = tw; c.height = H;
    c.getContext('2d').drawImage(video, 0, 0, tw, H);
    c.style.cssText = `width:${tw}px;height:${H}px;flex-shrink:0;`;
    thumbCanvasStrip.appendChild(c);
  }

  thumbStatus.style.display = 'none';
  video.currentTime = 0;
  updateUI();
}

function seekToTime(t) {
  return new Promise(resolve => {
    const done = () => { video.removeEventListener('seeked', done); resolve(); };
    video.addEventListener('seeked', done);
    video.currentTime = t;
  });
}

// ── Play / Pause ──
function setPlayIcon(on) {
  if (on) {
    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="#0a0a0c" stroke="#0a0a0c"/><rect x="14" y="4" width="4" height="16" fill="#0a0a0c" stroke="#0a0a0c"/>';
    playLabel.textContent = '暫停';
  } else {
    playIcon.innerHTML = '<polygon fill="#0a0a0c" stroke="#0a0a0c" points="5 3 19 12 5 21 5 3"/>';
    playLabel.textContent = '播放';
  }
}

playBtn.addEventListener('click', e => { e.stopPropagation(); togglePlay(); });

function togglePlay() {
  if (frameMode) { toggleFrameMode(); return; }
  if (video.paused) {
    video.play(); isPlaying = true; setPlayIcon(true); resetAutoHide();
  } else {
    video.pause(); isPlaying = false; setPlayIcon(false); clearTimeout(autoHideTimer);
  }
}

// ── Frame mode ──
function stopFrameMode() {
  if (frameInterval) { clearInterval(frameInterval); frameInterval = null; }
  frameMode = false;
}
function toggleFrameMode() {
  if (frameMode) { stopFrameMode(); setPlayIcon(false); return; }
  video.pause(); isPlaying = false;
  frameMode = true; setPlayIcon(true);
  const spf = 1 / fps;
  frameInterval = setInterval(() => {
    if (!frameMode) return;
    const next = video.currentTime + spf;
    if (next >= duration) { stopFrameMode(); setPlayIcon(false); return; }
    const done = () => { video.removeEventListener('seeked', done); updateUI(); };
    video.addEventListener('seeked', done);
    video.currentTime = next;
  }, 1000);
}

video.addEventListener('timeupdate', updateUI);
video.addEventListener('ended', () => {
  isPlaying = false; setPlayIcon(false); stopFrameMode(); clearTimeout(autoHideTimer);
});

// ── Speed buttons ──
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    stopFrameMode();
    const s = btn.dataset.speed;
    if (s === 'frame') {
      video.pause(); isPlaying = false; currentSpeed = 1; video.playbackRate = 1;
      toggleFrameMode();
    } else {
      currentSpeed = parseFloat(s);
      video.playbackRate = currentSpeed;
      if (!video.paused) setPlayIcon(true);
    }
    resetAutoHide();
  });
});

// ── ±5s ──
document.getElementById('back5-btn').addEventListener('click', e => {
  e.stopPropagation();
  stopFrameMode(); video.currentTime = Math.max(0, video.currentTime - 5);
  updateUI(); resetAutoHide();
});
document.getElementById('fwd5-btn').addEventListener('click', e => {
  e.stopPropagation();
  stopFrameMode(); video.currentTime = Math.min(duration, video.currentTime + 5);
  updateUI(); resetAutoHide();
});

// ── Prev / Next frame with long-press ──
function stepFrame(dir) {
  stopFrameMode();
  video.pause(); isPlaying = false; setPlayIcon(false);
  video.currentTime = Math.max(0, Math.min(duration, video.currentTime + dir / fps));
  updateUI();
}
function setupLongPress(el, dir) {
  let pt = null, rt = null;
  function start(e) {
    e.preventDefault(); e.stopPropagation();
    stepFrame(dir);
    pt = setTimeout(() => { rt = setInterval(() => stepFrame(dir), 80); }, 380);
  }
  function stop() { clearTimeout(pt); clearInterval(rt); pt = null; rt = null; }
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', stop);
  el.addEventListener('touchcancel', stop);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop);
}
setupLongPress(document.getElementById('prev-frame-btn'), -1);
setupLongPress(document.getElementById('next-frame-btn'), +1);

// ── Timeline scrub ──
let isScrubbing = false;
function scrubAt(cx) {
  const r = thumbnailStrip.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * duration;
  updateUI();
}
thumbnailStrip.addEventListener('touchstart', e => {
  e.stopPropagation(); isScrubbing = true; scrubAt(e.touches[0].clientX);
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
}, { passive: true });
thumbnailStrip.addEventListener('touchmove', e => { if (isScrubbing) scrubAt(e.touches[0].clientX); }, { passive: true });
thumbnailStrip.addEventListener('touchend', () => isScrubbing = false);
thumbnailStrip.addEventListener('mousedown', e => {
  e.stopPropagation(); isScrubbing = true; scrubAt(e.clientX);
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
});
document.addEventListener('mousemove', e => { if (isScrubbing) scrubAt(e.clientX); });
document.addEventListener('mouseup', () => isScrubbing = false);

// ── Progress bar scrub ──
const progressWrap = document.getElementById('progress-bar-wrap');
function scrubProg(cx) {
  const r = progressWrap.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * duration;
  updateUI();
}
progressWrap.addEventListener('touchstart', e => {
  e.stopPropagation(); scrubProg(e.touches[0].clientX);
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
}, { passive: true });
progressWrap.addEventListener('touchmove', e => scrubProg(e.touches[0].clientX), { passive: true });
progressWrap.addEventListener('mousedown', e => { e.stopPropagation(); scrubProg(e.clientX); });

// ── Save frame PNG ──
document.getElementById('save-btn').addEventListener('click', e => {
  e.stopPropagation();
  video.pause(); isPlaying = false; setPlayIcon(false);
  const w = video.videoWidth, h = video.videoHeight;
  hiddenCanvas.width = w; hiddenCanvas.height = h;
  const ctx = hiddenCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(video, 0, 0, w, h);
  const frame = Math.round(video.currentTime * fps);
  const tc = formatTime(video.currentTime).replace(/[:.]/g, '_');
  hiddenCanvas.toBlob(blob => {
    if (!blob) { showToast('截圖失敗'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `frame_${String(frame).padStart(6,'0')}_${tc}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast(`已儲存 Frame ${frame}（PNG）`);
  }, 'image/png');
  resetAutoHide();
});

// Prevent control taps from toggling play
controls.addEventListener('click', e => e.stopPropagation());
</script>
